---
- name: Install Neutron
  apt:
    name:
      - neutron-server
      - neutron-plugin-ml2
      - neutron-linuxbridge-agent
      - neutron-dhcp-agent
      - neutron-metadata-agent
    state: present

- name: Configure Neutron
  template:
    src: neutron.conf.j2
    dest: /etc/neutron/neutron.conf

- name: Restart Neutron Services
  systemd:
    name: neutron-server
    enabled: yes
    state: restarted
